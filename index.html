<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Pesca Mare</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎣</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* === BASE === */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#eaf4fb,#dbe9f4);color:#0a2a43;transition:background .3s ease}
body.dark{background:#0f172a;color:#e2e8f0}
header{background:linear-gradient(90deg,#0a2a43,#144d73);color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;letter-spacing:1px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
#content{padding:20px;padding-bottom:90px;animation:fadeIn .4s ease}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:18px}
.card{background:white;border-radius:22px;padding:22px;box-shadow:0 8px 20px rgba(0,0,0,.12);text-align:center;cursor:pointer;transition:all .25s ease;margin-bottom:14px}
.card:hover{transform:translateY(-6px);box-shadow:0 14px 25px rgba(0,0,0,.18)}
.card:active{transform:scale(.96)}
.card h3{margin:12px 0 6px;font-size:18px}
.card p{font-size:14px;opacity:.75}
.home-icon{font-size:42px;display:block;margin-bottom:10px}
body.dark .card{background:#1e293b;color:#e2e8f0}
.mini-container{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px}
.mini-card{background:#f1f6fa;padding:8px 14px;border-radius:14px;font-size:13px;cursor:pointer;transition:all .25s ease;border:1px solid rgba(0,0,0,.05)}
.mini-card:hover{transform:translateY(-3px)}
.mini-card.active{background:linear-gradient(90deg,#0a2a43,#144d73);color:white;transform:scale(1.05)}
body.dark .mini-card{background:#334155;border:none}
body.dark .mini-card.active{background:linear-gradient(90deg,#1e3a8a,#2563eb)}
footer{position:fixed;bottom:0;left:0;width:100%;background:white;display:flex;justify-content:space-around;align-items:center;height:64px;box-shadow:0 -3px 10px rgba(0,0,0,.1);border-radius:18px 18px 0 0;z-index:100}
body.dark footer{background:#1e293b}
footer button{background:none;border:none;font-size:13px;color:#0a2a43;cursor:pointer;padding:8px 4px}
body.dark footer button{color:white}
button{background:linear-gradient(90deg,#0a2a43,#144d73);border:none;padding:10px 18px;border-radius:20px;color:white;font-weight:bold;cursor:pointer;transition:.3s;margin-top:10px}
button:hover{transform:scale(1.04)}
.toggle-btn{background:linear-gradient(135deg,#0077b6,#00b4d8);border:none;padding:10px 16px;border-radius:20px;color:white;font-weight:bold;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;max-width:320px;margin-top:10px}
.toggle-btn:hover{transform:scale(1.03)}
.toggle-btn .arrow{transition:transform .3s ease}
.toggle-btn.active .arrow{transform:rotate(180deg)}
.image-box{overflow:hidden;max-height:0;transition:max-height .4s ease,opacity .3s ease;opacity:0}
.image-box.open{max-height:600px;opacity:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.waves-bg{position:fixed;bottom:0;left:0;width:100%;height:180px;overflow:hidden;z-index:-1;opacity:.25;pointer-events:none}
.waves-bg svg{width:200%;height:100%;animation:waveMove 18s linear infinite;fill:#00b4d8}
@keyframes waveMove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#06283D,#0a2a43);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;color:white;animation:fadeOutSplash 1.2s ease forwards;animation-delay:2.2s}
.logo-anim{font-size:60px;animation:floatLogo 2s ease-in-out infinite}
@keyframes floatLogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes fadeOutSplash{to{opacity:0;visibility:hidden}}
</style>
<style>
/* === PREVISIONI === */
.prev-hero{background:linear-gradient(135deg,#0a2a43,#0077b6);border-radius:22px;padding:20px;color:white;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.prev-hero h2{margin:0 0 4px;font-size:20px}
.prev-hero .sub{opacity:.75;font-size:13px;margin-bottom:14px}
.rating-bar{display:flex;gap:6px;align-items:center;margin:10px 0}
.rating-bar .stelle{font-size:22px;letter-spacing:2px}
.rating-bar .label{font-size:13px;font-weight:700;opacity:.9}
.meteo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.meteo-cell{background:rgba(255,255,255,.12);border-radius:14px;padding:10px 6px;text-align:center}
.meteo-cell .ico{font-size:22px;display:block;margin-bottom:4px}
.meteo-cell .val{font-size:15px;font-weight:700;display:block}
.meteo-cell .lbl{font-size:11px;opacity:.75;display:block}
.giorni-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.giorni-scroll::-webkit-scrollbar{display:none}
.giorno-card{flex:0 0 110px;background:white;border-radius:18px;padding:12px 8px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.10);cursor:default}
body.dark .giorno-card{background:#1e293b;color:#e2e8f0}
.giorno-card .giorno-nome{font-size:12px;font-weight:700;opacity:.6;margin-bottom:4px}
.giorno-card .giorno-ico{font-size:26px;margin:4px 0}
.giorno-card .giorno-val{font-size:13px;font-weight:700}
.giorno-card .giorno-sub{font-size:11px;opacity:.6;margin-top:2px}
.giorno-card .giorno-rate{font-size:14px;margin-top:4px}
.consiglio-card{background:white;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.10)}
body.dark .consiglio-card{background:#1e293b;color:#e2e8f0}
.consiglio-card h3{margin:0 0 12px;font-size:16px;color:#0a2a43}
body.dark .consiglio-card h3{color:#7dd3fc}
.consiglio-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,.07)}
.consiglio-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.consiglio-row .ico-big{font-size:26px;flex-shrink:0}
.consiglio-row .testo{flex:1}
.consiglio-row .titolo{font-weight:700;font-size:13px;margin-bottom:2px}
.consiglio-row .valore{font-size:13px;opacity:.75;line-height:1.5}
.mappa-card{background:white;border-radius:22px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.10)}
.mappa-header{background:linear-gradient(90deg,#0a2a43,#144d73);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.mappa-header span{color:white;font-weight:700;font-size:14px}
.mappa-header button{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:white;font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;margin-top:0}
#prevMap{height:280px;width:100%}
.spot-list{margin-bottom:14px}
.spot-item{background:white;border-radius:16px;padding:14px 16px;margin-bottom:8px;box-shadow:0 4px 10px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;cursor:pointer}
body.dark .spot-item{background:#1e293b;color:#e2e8f0}
.spot-item .spot-ico{font-size:24px;flex-shrink:0}
.spot-item .spot-info{flex:1}
.spot-item .spot-nome{font-weight:700;font-size:14px}
.spot-item .spot-sub{font-size:12px;opacity:.6;margin-top:2px}
.spot-item .spot-del{background:none;border:none;color:#e74c3c;font-size:18px;cursor:pointer;margin-top:0;padding:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-box{background:white;width:100%;border-radius:24px 24px 0 0;padding:24px 20px 40px;max-height:85vh;overflow-y:auto}
body.dark .modal-box{background:#1e293b;color:#e2e8f0}
.modal-box h3{margin:0 0 18px;font-size:18px}
.modal-input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #d0d7de;font-size:14px;margin-bottom:12px;box-sizing:border-box;background:white;color:#0a2a43}
body.dark .modal-input{background:#334155;border-color:#4b5563;color:#e2e8f0}
.btn-salva-spot{background:linear-gradient(90deg,#0a2a43,#144d73);color:white;border:none;padding:14px;border-radius:16px;font-size:15px;font-weight:700;width:100%;cursor:pointer;margin-top:6px}
.btn-chiudi-modal{background:#f0f0f0;color:#333;border:none;padding:12px;border-radius:16px;font-size:14px;width:100%;cursor:pointer;margin-top:8px}
body.dark .btn-chiudi-modal{background:#334155;color:#e2e8f0}
.prev-loader{text-align:center;padding:60px 20px}
.prev-loader .spinner{font-size:48px;animation:floatLogo 1.5s ease-in-out infinite;display:block;margin-bottom:16px}
.prev-loader p{opacity:.6;font-size:14px}
.prev-errore{background:#fff3cd;border-radius:18px;padding:20px;text-align:center;margin-bottom:14px}
.prev-errore .ico{font-size:40px;display:block;margin-bottom:10px}
.prev-errore p{font-size:14px;color:#856404;margin:0 0 14px}
</style>
<style>
/* === SPOT ITALIA === */
.spot-italia-header{background:linear-gradient(135deg,#0a2a43,#0077b6);border-radius:22px;padding:18px 20px;color:white;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.spot-italia-header h3{margin:0 0 4px;font-size:18px}
.spot-italia-header p{margin:0;font-size:12px;opacity:.75}
.filtri-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filtro-select{flex:1;min-width:120px;padding:10px 12px;border-radius:14px;border:1px solid #d0d7de;font-size:13px;font-weight:600;background:white;color:#0a2a43;outline:none;box-shadow:0 2px 8px rgba(0,0,0,.07)}
body.dark .filtro-select{background:#1e293b;color:#e2e8f0;border-color:#4b5563}
.btn-via{background:linear-gradient(90deg,#e67e22,#f39c12);border:none;padding:10px 20px;border-radius:14px;color:white;font-weight:800;font-size:14px;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 12px rgba(230,126,34,.4);transition:.2s}
.btn-via:hover{transform:scale(1.05);margin-top:0}
.spot-italia-item{background:white;border-radius:16px;padding:14px 16px;margin-bottom:8px;box-shadow:0 4px 10px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.spot-italia-item:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.14)}
body.dark .spot-italia-item{background:#1e293b;color:#e2e8f0}
.spot-italia-item .si-ico{font-size:24px;flex-shrink:0}
.spot-italia-item .si-info{flex:1}
.spot-italia-item .si-nome{font-weight:700;font-size:14px}
.spot-italia-item .si-sub{font-size:12px;opacity:.6;margin-top:2px}
.spot-italia-item .si-badge{background:#e0f2fe;color:#0369a1;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;white-space:nowrap}
.modal-spot-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-spot-box{background:white;width:100%;border-radius:24px 24px 0 0;padding:24px 20px 40px;max-height:80vh;overflow-y:auto}
body.dark .modal-spot-box{background:#1e293b;color:#e2e8f0}
.modal-spot-box .msb-tag{display:inline-block;background:#e0f2fe;color:#0369a1;font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;text-transform:uppercase;margin-bottom:12px}
.modal-spot-box h2{margin:0 0 16px;font-size:22px;font-weight:900}
.modal-spot-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.modal-spot-cell{background:#f8fafc;border-radius:14px;padding:12px}
body.dark .modal-spot-cell{background:#334155}
.modal-spot-cell .msc-lbl{font-size:10px;font-weight:700;opacity:.5;text-transform:uppercase;margin-bottom:4px}
.modal-spot-cell .msc-val{font-size:13px;font-weight:700}
.modal-spot-tips{background:#eff6ff;border-radius:16px;padding:14px 16px;margin-bottom:16px}
body.dark .modal-spot-tips{background:#1e3a5f}
.modal-spot-tips p{margin:0;font-size:13px;line-height:1.6;color:#1e40af}
body.dark .modal-spot-tips p{color:#93c5fd}
.btn-navigazione{background:linear-gradient(90deg,#0a2a43,#144d73);color:white;border:none;padding:14px;border-radius:16px;font-size:15px;font-weight:700;width:100%;cursor:pointer;margin-top:0}
.btn-chiudi-spot{background:#f0f0f0;color:#333;border:none;padding:12px;border-radius:16px;font-size:14px;width:100%;cursor:pointer;margin-top:8px}
body.dark .btn-chiudi-spot{background:#334155;color:#e2e8f0}
#spotItaliaMap{height:300px;width:100%;border-radius:0}
.spot-count-badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:12px;margin-left:8px}
.map-hint{text-align:center;padding:14px 16px;font-size:13px;opacity:.6;font-style:italic;border-top:1px solid rgba(0,0,0,.06)}
</style>
</head>
<body>
<div id="splash"><div class="logo-anim">🌊</div><h2>Mare Fishing App</h2></div>
<div class="waves-bg"><svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,100 C300,180 900,20 1200,100 L1200,200 L0,200 Z"></path></svg></div>
<header>🎣 Assistente Pesca Mare</header>
<div id="content"></div>
<footer>
  <button onclick="showHome()">🏠 Home</button>
  <button onclick="showTecniche()">🌊 Tecniche</button>
  <button onclick="showSpecie()">🐟 Specie</button>
  <button onclick="showMontature()">🪝 Montature</button>
  <button onclick="showNodi()">🧵 Nodi</button>
  <button onclick="showPrevisioni()">⚓ Meteo</button>
  <button onclick="toggleTema()">🌙 Dark</button>
</footer>

<script>
/* === TEMA === */
function toggleTema(){document.body.classList.toggle("dark");localStorage.setItem("tema",document.body.classList.contains("dark")?"dark":"light")}
function caricaTema(){if(localStorage.getItem("tema")==="dark")document.body.classList.add("dark")}

/* === HOME === */
function showHome(){
  document.getElementById("content").innerHTML=`
    <h2 style="margin-top:0;">Benvenuto 🎣</h2>
    <p style="opacity:0.7;margin-bottom:20px;">Seleziona una sezione per iniziare</p>
    <div class="grid">
      <div class="card" onclick="showTecniche()"><span class="home-icon">🌊</span><h3>Tecniche Mare</h3><p>Surfcasting, spinning, eging…</p></div>
      <div class="card" onclick="showSpecie()"><span class="home-icon">🐟</span><h3>Specie</h3><p>I pesci più pescati</p></div>
      <div class="card" onclick="showMontature()"><span class="home-icon">🪝</span><h3>Montature</h3><p>Spiegate passo-passo</p></div>
      <div class="card" onclick="showNodi()"><span class="home-icon">🧵</span><h3>Nodi</h3><p>Con immagini</p></div>
      <div class="card" onclick="showPrevisioni()"><span class="home-icon">⚓</span><h3>Meteo & Spot</h3><p>Previsioni + mappa pesca</p></div>
    </div>`
}

/* === TECNICHE === */
function showTecniche(){
  document.getElementById("content").innerHTML=`
    <h2>🌊 Tecniche di Pesca in Mare</h2>
    <div class="card" onclick="showSurfcasting()"><b>🏖️ Surfcasting</b><br>Pesca dalla spiaggia con piombi pesanti</div>
    <div class="card" onclick="showSpinning()"><b>🎣 Spinning</b><br>Esche artificiali da riva</div>
    <div class="card" onclick="showEging()"><b>🦑 Eging</b><br>Pesca a seppie e calamari</div>
    <div class="card" onclick="showFondo()"><b>⚓ Pesca a Fondo</b><br>Porto e scogliera</div>
    <div class="card" onclick="showGalleggiante()"><b>🎈 Galleggiante</b><br>Tecnica precisa e leggera</div>`
}

function showSurfcasting(){
  document.getElementById("content").innerHTML=`
    <h2>🏖️ Surfcasting</h2>
    <div class="card"><b>Quando usarla</b><br>Mare mosso o formato, spiagge sabbiose, alba e tramonto</div>
    <div class="card"><b>Attrezzatura base</b><br>Canna 4–4,5 m • Mulinello 8000–14000 • Nylon 0,35–0,40</div>
    <div class="card" style="cursor:default;">
      <h3>🪝 Montature dedicate</h3>
      <p style="font-size:12px;opacity:0.55;margin:0 0 12px;">Tocca per vedere lo schema</p>
      <button onclick="toggleImageBox('traveBox','img/montature/14_minitrave.jpg',this)" class="toggle-btn">📷 Montatura a Trave <span class="arrow">▼</span></button>
      <div id="traveBox" class="image-box"></div>
      <button onclick="toggleImageBox('paternosterBox','img/montature/06_paternoster.jpg',this)" class="toggle-btn">📷 Paternoster <span class="arrow">▼</span></button>
      <div id="paternosterBox" class="image-box"></div>
      <button onclick="toggleImageBox('longArmBox','img/montature/03_long_arm.jpg',this)" class="toggle-btn">📷 Long Arm <span class="arrow">▼</span></button>
      <div id="longArmBox" class="image-box"></div>
      <button onclick="toggleImageBox('pulleyBox','img/montature/10_pulley_rig.jpg',this)" class="toggle-btn">📷 Pulley Rig <span class="arrow">▼</span></button>
      <div id="pulleyBox" class="image-box"></div>
    </div>
    <div class="card"><b>Pro</b><br>Raggiunge grandi distanze, ideale per grossi pesci</div>
    <div class="card"><b>Contro</b><br>Tecnica impegnativa, attrezzatura pesante</div>
    <div class="card"><h3>🐟 Specie consigliate</h3>${generaListaCliccabile(surfcastingData.specie)}</div>
    <div class="card"><h3>🪱 Esche consigliate</h3>${generaListaCliccabile(surfcastingData.esche)}</div>
    <button onclick="showTecniche()">👈 Torna alle tecniche</button>`
}

function showGalleggiante(){
  document.getElementById("content").innerHTML=`
    <h2>🎈 Galleggiante</h2>
    <div class="card"><b>Quando usarla</b><br>Mare calmo • Porto • Scogliera</div>
    <div class="card"><b>Attrezzatura base</b><br>Canna 4–6 m • Nylon sottile • Galleggiante fisso o scorrevole</div>
    <div class="card"><b>Specie principali</b><br>Cefalo • Sarago • Occhiata • Orata piccola</div>
    <div class="card"><b>Pro</b><br>Tecnica precisa e sensibile</div>
    <div class="card"><b>Contro</b><br>Poco efficace con mare mosso</div>
    ${generaSpeciePerTecnica("galleggiante")}
    <button onclick="showTecniche()">👈 Torna alle tecniche</button>`
}

function showSpinning(){
  const d=tecnicheData.spinning
  document.getElementById("content").innerHTML=`
    <h2>🎣 Spinning</h2>
    <div class="card"><h3>📅 Quando usarla</h3><p>${d.quando}</p></div>
    <div class="card"><h3>🎒 Attrezzatura base</h3><p>${d.attrezzatura}</p></div>
    <div class="card"><h3>✅ Pro</h3><ul>${d.pro.map(p=>`<li>${p}</li>`).join("")}</ul></div>
    <div class="card"><h3>❌ Contro</h3><ul>${d.contro.map(c=>`<li>${c}</li>`).join("")}</ul></div>
    <div class="card"><h3>🐟 Specie consigliate</h3>${generaListaCliccabile(d.specie)}</div>
    <div class="card"><h3>🪱 Esche consigliate</h3>${generaListaCliccabile(d.esche)}</div>
    <div class="card"><h3>🎥 Video tutorial</h3><a href="${d.video}" target="_blank">Guarda su YouTube</a></div>
    <button onclick="showTecniche()">👈 Torna alle tecniche</button>`
}

function showEging(){
  const d=tecnicheData.eging
  document.getElementById("content").innerHTML=`
    <h2>🦑 Eging</h2>
    <div class="card"><h3>📅 Quando usarla</h3><p>${d.quando}</p></div>
    <div class="card"><h3>🎒 Attrezzatura base</h3><p>${d.attrezzatura}</p></div>
    <div class="card"><h3>✅ Pro</h3><ul>${d.pro.map(p=>`<li>${p}</li>`).join("")}</ul></div>
    <div class="card"><h3>❌ Contro</h3><ul>${d.contro.map(c=>`<li>${c}</li>`).join("")}</ul></div>
    <div class="card"><h3>🦑 Specie consigliate</h3>${generaListaCliccabile(d.specie)}</div>
    <div class="card"><h3>🎥 Video tutorial</h3><a href="${d.video}" target="_blank">Guarda su YouTube</a></div>
    <button onclick="showTecniche()">👈 Torna alle tecniche</button>`
}

function showFondo(){
  document.getElementById("content").innerHTML=`
    <h2>⚓ Pesca a Fondo</h2>
    <div class="card"><b>Quando usarla</b><br>Tutto l'anno • Porto • Scogliera • Spiaggia</div>
    <div class="card"><b>Attrezzatura base</b><br>Canna 3–4 m • Mulinello 4000–6000 • Nylon 0,30–0,40</div>
    <div class="card"><h3>🐟 Specie consigliate</h3>${generaListaCliccabile(tecnicheData.fondo.specie)}</div>

let _openBox=null, _openBtn=null
function toggleImageBox(id,imgPath,button){
  const box=document.getElementById(id); if(!box)return
  if(_openBox&&_openBox!==box){_openBox.classList.remove("open");_openBox.innerHTML="";if(_openBtn)_openBtn.classList.remove("active")}
  if(box.classList.contains("open")){box.classList.remove("open");box.innerHTML="";button.classList.remove("active");_openBox=null;_openBtn=null;return}
  if(box.innerHTML===""){const img=document.createElement("img");img.src=imgPath;img.style.cssText="width:100%;border-radius:14px;margin-top:10px;display:block;";img.onerror=function(){this.style.display="none"};box.appendChild(img)}
  box.classList.add("open");button.classList.add("active")
  setTimeout(()=>box.scrollIntoView({behavior:"smooth",block:"center"}),200)
  _openBox=box;_openBtn=button
}
function generaListaCliccabile(lista){
  let html="<div class='mini-container'>"
  lista.forEach((item,i)=>{
    const sid="img-"+item.nome.replace(/[^a-zA-Z0-9]/g,"_")+"-"+i
    html+=`<div class="mini-card" onclick="toggleImgById('${sid}')">${item.nome}<div id="${sid}" style="display:none;margin-top:10px;"><img src="${item.img}" style="width:100%;max-width:250px;border-radius:12px;" onerror="this.style.display='none'"></div></div>`
  })
  return html+"</div>"
}
function toggleImgById(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==="none"?"block":"none"}
function generaCalendario(stagione){
  if(!stagione)return""
  const mesi=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"]
  const mc=new Date().getMonth()+1
  let html="<div class='card' style='cursor:default;'><b>📅 Calendario attività</b><br><br><div style='display:flex;flex-wrap:wrap;gap:6px;'>"
  for(let i=1;i<=12;i++){
    const a=stagione.includes(i)
    html+=`<div style="padding:6px 8px;border-radius:6px;font-size:12px;text-align:center;min-width:32px;${a?"background:#2ecc71;color:white;":"background:#eee;"}${i===mc?"border:2px solid #007bff;":""}">${mesi[i-1]}</div>`
  }
  return html+"</div></div>"
}
function generaSpeciePerTecnica(n){
  let html="<div class='card' style='cursor:default;'><b>🐟 Specie consigliate</b><br><br>"
  for(let k in specie)if(specie[k].tecniche.toLowerCase().includes(n.toLowerCase()))html+=`<div style="margin:6px 0;cursor:pointer;color:#0a2a43;" onclick="showSpecieDetail('${k}')">• ${specie[k].nome}</div>`
  return html+"</div>"
}
function generaMontatureSpecie(list){
  if(!list||list.length===0)return""
  return`<div class="card" style="cursor:default;text-align:left;"><b>🪝 Montature consigliate</b><br><br>${list.map(m=>`<div style="margin:5px 0;cursor:pointer;color:#1a6fa8;font-weight:600;" onclick="showMontaturaDetail('${m}')">${m.replace(/-/g," ")} →</div>`).join("")}</div>`
}
function trovaIndiceOra(times,ora){const s=ora.toISOString().slice(0,13);const i=times.findIndex(t=>t&&t.startsWith(s));return i>=0?i:0}
function stelleRating(r){return"⭐".repeat(r)+"☆".repeat(5-r)}
function direzioneVento(deg){return["N","NE","E","SE","S","SO","O","NO"][Math.round(deg/45)%8]||"—"}
function iconaMeteo(c){if(c===0)return"☀️";if(c<=2)return"🌤️";if(c<=3)return"☁️";if(c<=49)return"🌫️";if(c<=55)return"🌦️";if(c<=65)return"🌧️";if(c<=77)return"❄️";if(c<=82)return"🌦️";if(c<=99)return"⛈️";return"🌡️"}
function descrizioneMeteo(c){if(c===0)return"Sereno";if(c<=2)return"Poco nuv.";if(c<=3)return"Coperto";if(c<=49)return"Nebbia";if(c<=55)return"Pioggerella";if(c<=65)return"Pioggia";if(c<=77)return"Neve";if(c<=82)return"Rovesci";if(c<=99)return"Temporale";return"—"}
function formatOra(s){if(!s)return"--:--";try{return s.slice(11,16)}catch(e){return"--:--"}}
function mostraErroreGPS(msg){document.getElementById("content").innerHTML=`<div class="prev-errore"><span class="ico">📡</span><p>${msg}</p><button onclick="showPrevisioni()">🔄 Riprova</button></div>`}
</script>

<script>
/* === PREVISIONI === */
let prevMap=null, prevCoords=null

function showPrevisioni(){
  document.getElementById("content").innerHTML=`<div class="prev-loader"><span class="spinner">🎣</span><p>Rilevamento posizione in corso…</p></div>`
  if(!navigator.geolocation){mostraErroreGPS("Il tuo browser non supporta la geolocalizzazione.");return}
  navigator.geolocation.getCurrentPosition(
    pos=>{prevCoords={lat:pos.coords.latitude,lon:pos.coords.longitude};caricaPrevisioni(prevCoords.lat,prevCoords.lon)},
    ()=>mostraErroreGPS("Impossibile rilevare la posizione. Verifica che il GPS sia attivo."),
    {enableHighAccuracy:true,timeout:10000}
  )
}

async function caricaPrevisioni(lat,lon){
  try{
    const[marineRes,meteoRes]=await Promise.all([
      fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wave_period&daily=wave_height_max&timezone=Europe%2FRome&forecast_days=4`),
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,sunrise,wind_speed_10m_max,weather_code&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m&timezone=Europe%2FRome&forecast_days=4`)
    ])
    const marine=await marineRes.json(), meteo=await meteoRes.json()
    renderPrevisioni(lat,lon,marine,meteo)
  }catch(e){mostraErroreGPS("Errore nel caricamento dati meteo. Controlla la connessione.")}
}

function renderPrevisioni(lat,lon,marine,meteo){
  const ora=new Date()
  const hIdx=trovaIndiceOra(marine.hourly?.time||[],ora)
  const ondaH=marine.hourly?.wave_height?.[hIdx]??0
  const ondaP=marine.hourly?.wave_period?.[hIdx]??0
  const ventoKmh=meteo.current?.wind_speed_10m??0
  const ventoDir=meteo.current?.wind_direction_10m??0
  const tempC=meteo.current?.temperature_2m??"--"
  const wCode=meteo.current?.weather_code??0
  const ventoNodi=(ventoKmh*0.539957).toFixed(1)
  const analisi=calcolaConsiglioCompleto(ondaH,ventoKmh,ora,wCode)
  const giorniHTML=generaGiorni(marine,meteo,ora)
  const miei_spots=caricaSpot()

  document.getElementById("content").innerHTML=`
    <div class="prev-hero">
      <h2>⚓ Previsioni Pesca</h2>
      <div class="sub">📍 ${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E • Aggiornato ora</div>
      <div class="rating-bar"><span class="stelle">${stelleRating(analisi.rating)}</span><span class="label">${analisi.labelRating}</span></div>
      <div class="meteo-grid">
        <div class="meteo-cell"><span class="ico">🌊</span><span class="val">${ondaH.toFixed(1)} m</span><span class="lbl">Onda</span></div>
        <div class="meteo-cell"><span class="ico">💨</span><span class="val">${ventoNodi} nodi</span><span class="lbl">Vento ${direzioneVento(ventoDir)}</span></div>
        <div class="meteo-cell"><span class="ico">🌡️</span><span class="val">${tempC}°C</span><span class="lbl">Temperatura</span></div>
        <div class="meteo-cell"><span class="ico">⏱️</span><span class="val">${ondaP.toFixed(0)} s</span><span class="lbl">Periodo onda</span></div>
        <div class="meteo-cell"><span class="ico">${iconaMeteo(wCode)}</span><span class="val">${descrizioneMeteo(wCode)}</span><span class="lbl">Cielo</span></div>
        <div class="meteo-cell"><span class="ico">🌅</span><span class="val">${formatOra(meteo.daily?.sunrise?.[0])}</span><span class="lbl">Alba</span></div>
      </div>
    </div>
    <h3 style="margin:0 0 10px;font-size:15px;opacity:0.7;">📅 Prossimi 3 giorni</h3>
    <div class="giorni-scroll">${giorniHTML}</div>
    <div class="consiglio-card">
      <h3>🎯 Consiglio personalizzato</h3>
      <div class="consiglio-row"><span class="ico-big">🌊</span><div class="testo"><div class="titolo">Tecnica consigliata</div><div class="valore">${analisi.tecnica}</div></div></div>
      <div class="consiglio-row"><span class="ico-big">🐟</span><div class="testo"><div class="titolo">Specie probabili</div><div class="valore">${analisi.specie}</div></div></div>
      <div class="consiglio-row"><span class="ico-big">🪝</span><div class="testo"><div class="titolo">Montatura</div><div class="valore">${analisi.montatura}</div></div></div>
      <div class="consiglio-row"><span class="ico-big">🎣</span><div class="testo"><div class="titolo">Attrezzatura</div><div class="valore">${analisi.attrezzatura}</div></div></div>
      <div class="consiglio-row"><span class="ico-big">🪱</span><div class="testo"><div class="titolo">Esche consigliate</div><div class="valore">${analisi.esche}</div></div></div>
      ${analisi.avviso?`<div class="consiglio-row"><span class="ico-big">⚠️</span><div class="testo"><div class="titolo">Attenzione</div><div class="valore">${analisi.avviso}</div></div></div>`:""}
    </div>
    <div class="mappa-card">
      <div class="mappa-header"><span>🗺️ La tua posizione & Spot</span><button onclick="aggiungiSpot()">📌 Salva spot</button></div>
      <div id="prevMap"></div>
    </div>
    <h3 style="margin:0 0 10px;font-size:15px;opacity:0.7;">📌 I miei spot (${miei_spots.length})</h3>
    <div class="spot-list" id="spotList">${renderSpotList(miei_spots)}</div>
    <div style="margin:20px 0 10px;">
      <button onclick="showCercaSpot()" style="width:100%;background:linear-gradient(135deg,#0077b6,#00b4d8);font-size:16px;padding:14px;border-radius:18px;">🗺️ Cerca Spot Italia</button>
    </div>
    <button onclick="showPrevisioni()" style="width:100%;">🔄 Aggiorna previsioni</button><br>`

  setTimeout(()=>initMappa(lat,lon,miei_spots),100)
}

function calcolaConsiglioCompleto(ondaM,ventoKmh,ora,wCode){
  const ventoNodi=ventoKmh*0.539957, h=ora.getHours(), mese=ora.getMonth()+1
  const isAlba=h>=5&&h<=8, isMattina=h>=8&&h<=12, isTramonto=h>=17&&h<=20, isNotte=h>=21||h<=4
  const isPrimavera=mese>=3&&mese<=5, isEstate=mese>=6&&mese<=8, isAutunno=mese>=9&&mese<=11, isInverno=mese===12||mese<=2
  const mareCalmo=ondaM<0.5&&ventoNodi<10, mareMosso=ondaM>=0.5&&ondaM<1.2, mareFormato=ondaM>=1.2
  const ventoForte=ventoNodi>20, maltempo=wCode>=61
  let rating=5
  if(mareFormato)rating-=2; else if(mareMosso)rating-=1
  if(ventoForte)rating-=1
  if(maltempo)rating-=2
  if(isAlba||isTramonto)rating=Math.min(5,rating+1)
  rating=Math.max(1,Math.min(5,rating))
  const labelRating=["","Scarsa","Bassa","Discreta","Buona","Ottima"][rating]
  let tecnica,specie,montatura,attrezzatura,esche,avviso=""
  if(maltempo||(ventoNodi>25&&ondaM>1.5)){tecnica="Sconsigliato uscire";specie="Condizioni troppo avverse";montatura="—";attrezzatura="Attendi miglioramento";esche="—";avviso="Vento e mare eccessivi. Rischio sicurezza."}
  else if(isNotte&&!mareFormato){tecnica="Eging / Pesca notturna";specie="Seppia • Calamaro • Totano";montatura="Egi 2.5–3.5 con fluorocarbon 0.28–0.33";attrezzatura="Canna 2.3–2.6m • Mulinello 2500–3000 • Trecciato 0.8 PE";esche="Egi arancione / rosa al tramonto, bianco di notte"}
  else if(mareCalmo&&(isAlba||isTramonto)){tecnica="Spinning da riva";specie=isEstate||isPrimavera?"Spigola • Leccia • Serra • Palamita":"Spigola • Sarago • Orata";montatura="Long Arm / Scorrevole";attrezzatura="Canna 2.4–2.7m 10-40g • Mulinello 3000-4000 • Trecciato 0.12 + fluoro 0.35";esche="Minnow • Jerkbait • Popper • Metal Jig"}
  else if(mareCalmo&&!isNotte){tecnica=isMattina?"Galleggiante / Fondo leggero":"Surfcasting leggero";specie="Orata • Sarago • Occhiata • Cefalo";montatura=ondaM<0.3?"Galleggiante fisso":"Long Arm";attrezzatura="Canna 4–6m • Nylon 0.22–0.28 • Mulinello 4000";esche="Gambero • Bigattino • Coreano • Pane"}
  else if(mareMosso&&!ventoForte){tecnica="Surfcasting";specie=isAutunno||isInverno?"Mormora • Orata • Sarago pizzuto":"Orata • Mormora • Corvina";montatura=ondaM>0.8?"Short Rovesciato / Paternoster":"Paternoster";attrezzatura="Canna 4–4.5m • Mulinello 8000-10000 • Nylon 0.35-0.40";esche="Arenicola • Americano • Bibi • Coreano";if(isEstate)avviso="Controlla il tramonto: ottimo per Serra e Spigola."}
  else{tecnica="Pesca a fondo pesante";specie="Scorfano • Pagello • Gronco";montatura="Paternoster pesante / Tri-Amo";attrezzatura="Canna da fondo 3–4m • Mulinello 6000 • Nylon 0.45";esche="Polpo • Cozza • Sardina • Calamaro";if(ventoForte)avviso="Vento forte: attenzione sulla scogliera."}
  if(isInverno&&!maltempo)avviso=avviso||"Inverno: pesca mattutina nelle ore più calde."
  return{rating,labelRating,tecnica,specie,montatura,attrezzatura,esche,avviso}
}

function generaGiorni(marine,meteo,ora){
  const giorni=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"]; let html=""
  for(let i=1;i<=3;i++){
    const d=new Date(ora); d.setDate(d.getDate()+i)
    const nome=i===1?"Domani":giorni[d.getDay()]
    const tMax=meteo.daily?.temperature_2m_max?.[i]??"--"
    const tMin=meteo.daily?.temperature_2m_min?.[i]??"--"
    const wCode=meteo.daily?.weather_code?.[i]??0
    const vento=meteo.daily?.wind_speed_10m_max?.[i]??0
    const ondaMax=marine.daily?.wave_height_max?.[i]??0
    const ventoN=(vento*0.539957).toFixed(0)
    let r=5; if(ondaMax>1.2)r-=2; else if(ondaMax>0.5)r-=1; if(vento>37)r-=1; if(wCode>=61)r-=2; r=Math.max(1,Math.min(5,r))
    html+=`<div class="giorno-card"><div class="giorno-nome">${nome}</div><div class="giorno-ico">${iconaMeteo(wCode)}</div><div class="giorno-val">${tMax}° / ${tMin}°</div><div class="giorno-sub">🌊 ${ondaMax.toFixed(1)}m</div><div class="giorno-sub">💨 ${ventoN} nodi</div><div class="giorno-rate">${stelleRating(r)}</div></div>`
  }
  return html
}

function initMappa(lat,lon,miei_spots){
  if(prevMap){prevMap.remove();prevMap=null}
  prevMap=L.map("prevMap",{zoomControl:true}).setView([lat,lon],13)
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:18}).addTo(prevMap)
  L.tileLayer("https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png",{attribution:"© OpenSeaMap",opacity:0.8}).addTo(prevMap)
  const iGPS=L.divIcon({html:'<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));">📍</div>',iconSize:[32,32],iconAnchor:[16,32],className:""})
  L.marker([lat,lon],{icon:iGPS}).addTo(prevMap).bindPopup("<b>📍 Sei qui</b>").openPopup()
  miei_spots.forEach(s=>{
    const iSpot=L.divIcon({html:'<div style="font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));">📌</div>',iconSize:[30,30],iconAnchor:[15,30],className:""})
    L.marker([s.lat,s.lon],{icon:iSpot}).addTo(prevMap).bindPopup(`<b>📌 ${s.nome}</b><br>${s.specie||""}<br><small>${s.data}</small>`)
  })
}

function caricaSpot(){try{return JSON.parse(localStorage.getItem("pescaSpot")||"[]")}catch(e){return[]}}
function salvaSpot(spots){localStorage.setItem("pescaSpot",JSON.stringify(spots))}

function aggiungiSpot(){
  if(!prevCoords){alert("Posizione non disponibile.");return}
  document.body.insertAdjacentHTML("beforeend",`
    <div class="modal-overlay" id="spotModal" onclick="chiudiModalSpot(event)">
      <div class="modal-box">
        <h3>📌 Salva questo spot</h3>
        <input class="modal-input" id="spotNome" placeholder="Nome spot (es. Scoglio grande)" maxlength="40">
        <input class="modal-input" id="spotSpecie" placeholder="Specie catturate (es. Orata, Sarago)">
        <input class="modal-input" id="spotMontatura" placeholder="Montatura usata">
        <input class="modal-input" id="spotNote" placeholder="Note libere (profondità, ora…)">
        <button class="btn-salva-spot" onclick="confermaSpot()">💾 Salva spot</button>
        <button class="btn-chiudi-modal" onclick="document.getElementById('spotModal').remove()">Annulla</button>
      </div>
    </div>`)
}
function chiudiModalSpot(e){if(e.target.classList.contains("modal-overlay"))document.getElementById("spotModal")?.remove()}
function confermaSpot(){
  const nome=document.getElementById("spotNome").value.trim()||"Spot senza nome"
  const spot={id:Date.now(),nome,specie:document.getElementById("spotSpecie").value.trim(),montatura:document.getElementById("spotMontatura").value.trim(),note:document.getElementById("spotNote").value.trim(),lat:prevCoords.lat,lon:prevCoords.lon,data:new Date().toLocaleDateString("it-IT")}
  const spots=caricaSpot(); spots.unshift(spot); salvaSpot(spots)
  document.getElementById("spotModal")?.remove()
  document.getElementById("spotList").innerHTML=renderSpotList(spots)
  if(prevMap){const iSpot=L.divIcon({html:'<div style="font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));">📌</div>',iconSize:[30,30],iconAnchor:[15,30],className:""});L.marker([spot.lat,spot.lon],{icon:iSpot}).addTo(prevMap).bindPopup(`<b>📌 ${spot.nome}</b><br>${spot.specie}<br><small>${spot.data}</small>`).openPopup()}
}
function eliminaSpot(id){const spots=caricaSpot().filter(s=>s.id!==id);salvaSpot(spots);document.getElementById("spotList").innerHTML=renderSpotList(spots)}
function renderSpotList(spots){
  if(spots.length===0)return`<p style="opacity:0.5;font-size:13px;text-align:center;padding:10px;">Nessuno spot salvato.<br>Vai sul posto e tocca 📌 Salva spot!</p>`
  return spots.map(s=>`
    <div class="spot-item" onclick="centraMappa(${s.lat},${s.lon})">
      <span class="spot-ico">📌</span>
      <div class="spot-info">
        <div class="spot-nome">${s.nome}</div>
        <div class="spot-sub">${s.specie?"🐟 "+s.specie:""} ${s.montatura?"• 🪝 "+s.montatura:""}</div>
        <div class="spot-sub" style="opacity:.45;">${s.data} ${s.note?"• "+s.note:""}</div>
      </div>
      <button class="spot-del" onclick="event.stopPropagation();eliminaSpot(${s.id})">🗑️</button>
    </div>`).join("")
}
function centraMappa(lat,lon){
  if(prevMap)prevMap.setView([lat,lon],15)
  const el=document.getElementById("prevMap")
  if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-80,behavior:"smooth"})
}
</script>

let spotItaliaMap=null, spotItaliaMarkers=[], spotItaliaFiltrati=[], listaVisibile=false

function showCercaSpot(){
  document.getElementById("content").innerHTML=`
    <div class="spot-italia-header">
      <h3>🗺️ Spot Italia <span class="spot-count-badge" id="spotCount">${spotsItalia.length} spot</span></h3>
      <p>Seleziona regione e/o tecnica, poi premi VIA →</p>
    </div>
    <div class="filtri-row">
      <select class="filtro-select" id="filtroReg">
        <option value="all">📍 Tutta Italia</option>
        <option value="Liguria">Liguria</option>
        <option value="Toscana">Toscana</option>
        <option value="Lazio">Lazio</option>
        <option value="Campania">Campania</option>
        <option value="Calabria">Calabria</option>
        <option value="Puglia">Puglia</option>
        <option value="Basilicata">Basilicata</option>
        <option value="Abruzzo-Molise">Abruzzo/Molise</option>
        <option value="Marche">Marche</option>
        <option value="Emilia-Romagna">Emilia Romagna</option>
        <option value="Veneto">Veneto</option>
        <option value="Friuli-VG">Friuli V.G.</option>
        <option value="Sardegna">Sardegna</option>
        <option value="Sicilia">Sicilia</option>
      </select>
      <select class="filtro-select" id="filtroTech">
        <option value="all">🎣 Ogni tecnica</option>
        <option value="Surfcasting">Surfcasting</option>
        <option value="Spinning">Spinning</option>
        <option value="Eging">Eging</option>
        <option value="Bolognese">Bolognese/Fondo</option>
        <option value="Bassfishing">Bassfishing</option>
      </select>
      <button class="btn-via" onclick="applicaFiltriSpot()">VIA →</button>
    </div>
    <div class="mappa-card" style="margin-bottom:14px;">
      <div class="mappa-header">
        <span>🎣 Spot di Pesca Italia</span>
        <span id="mappaSpotCount" style="color:rgba(255,255,255,.7);font-size:12px;">Usa i filtri per cercare</span>
      </div>
      <div id="spotItaliaMap"></div>
      <div class="map-hint" id="mapHint">👆 Seleziona regione e/o tecnica e premi <b>VIA →</b></div>
    </div>
    <div id="listaSpotItalia"></div>
    <button onclick="showPrevisioni()" style="width:100%;margin-top:4px;">⬅️ Torna alle Previsioni</button><br>`

  listaVisibile=false; spotItaliaFiltrati=[]; spotItaliaMarkers=[]
  setTimeout(()=>initSpotItaliaMap(),100)
}

function applicaFiltriSpot(){
  const reg=document.getElementById("filtroReg")?.value||"all"
  const tech=document.getElementById("filtroTech")?.value||"all"
  spotItaliaFiltrati=spotsItalia.filter(s=>(reg==="all"||s.reg===reg)&&(tech==="all"||s.type===tech))
  const n=spotItaliaFiltrati.length
  if(document.getElementById("spotCount"))document.getElementById("spotCount").textContent=n+" spot"
  if(document.getElementById("mappaSpotCount"))document.getElementById("mappaSpotCount").textContent=n+" visibili"
  const hint=document.getElementById("mapHint"); if(hint)hint.style.display="none"
  aggiornaMappaSpotItalia(spotItaliaFiltrati)
  renderListaSpotItalia(spotItaliaFiltrati)
  listaVisibile=true
  if(spotItaliaMap&&spotItaliaFiltrati.length>0){
    const bounds=L.latLngBounds(spotItaliaFiltrati.map(s=>s.coords))
    spotItaliaMap.fitBounds(bounds,{padding:[30,30]})
  } else if(spotItaliaMap){spotItaliaMap.setView([41.871,12.567],6)}
}

function initSpotItaliaMap(){
  if(spotItaliaMap){spotItaliaMap.remove();spotItaliaMap=null}
  spotItaliaMarkers=[]
  spotItaliaMap=L.map("spotItaliaMap",{zoomControl:true}).setView([41.871,12.567],6)
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:18}).addTo(spotItaliaMap)
  L.tileLayer("https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png",{attribution:"© OpenSeaMap",opacity:0.7}).addTo(spotItaliaMap)
}

function aggiornaMappaSpotItalia(lista){
  spotItaliaMarkers.forEach(m=>spotItaliaMap.removeLayer(m)); spotItaliaMarkers=[]
  lista.forEach(spot=>{
    const icona=L.divIcon({html:'<div style="font-size:24px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));">🎣</div>',iconSize:[28,28],iconAnchor:[14,28],className:""})
    const m=L.marker(spot.coords,{icon:icona}).addTo(spotItaliaMap)
    m.on("click",()=>{
      spotItaliaMap.flyTo(spot.coords,13)
      apriDettaglioSpotItalia(spot)
      if(!listaVisibile){renderListaSpotItalia(spotsItalia.filter(s=>s.reg===spot.reg));listaVisibile=true}
    })
    spotItaliaMarkers.push(m)
  })
}

function renderListaSpotItalia(lista){
  const c=document.getElementById("listaSpotItalia"); if(!c)return
  if(lista.length===0){c.innerHTML=`<p style="opacity:0.5;text-align:center;padding:20px;font-size:13px;">Nessuno spot trovato con questi filtri.</p>`;return}
  c.innerHTML=lista.map(s=>`
    <div class="spot-italia-item" onclick="apriDettaglioSpotItalia(spotsItalia[${spotsItalia.indexOf(s)}])">
      <span class="si-ico">🎣</span>
      <div class="si-info">
        <div class="si-nome">${s.name}</div>
        <div class="si-sub">🐟 ${s.target}</div>
      </div>
      <span class="si-badge">${s.type}</span>
    </div>`).join("")
}

function apriDettaglioSpotItalia(spot){
  if(!spot)return
  document.getElementById("spotModalItalia")?.remove()
  document.body.insertAdjacentHTML("beforeend",`
    <div class="modal-spot-overlay" id="spotModalItalia" onclick="chiudiDettaglioSpot(event)">
      <div class="modal-spot-box">
        <span class="msb-tag">${spot.reg}</span>
        <h2>${spot.name}</h2>
        <div class="modal-spot-row">

          <div class="modal-spot-cell"><div class="msc-lbl">🐟 Target</div><div class="msc-val">${spot.target}</div></div>
        </div>
        <div class="modal-spot-tips"><p>💡 ${spot.tips}</p></div>
        <button class="btn-navigazione" onclick="window.open('https://www.google.com/maps?q=${spot.coords[0]},${spot.coords[1]}','_blank')">🧭 Ottieni indicazioni →</button>
        <button class="btn-chiudi-spot" onclick="document.getElementById('spotModalItalia').remove()">Chiudi</button>
      </div>
    </div>`)
}
function chiudiDettaglioSpot(e){if(e.target.classList.contains("modal-spot-overlay"))document.getElementById("spotModalItalia")?.remove()}
